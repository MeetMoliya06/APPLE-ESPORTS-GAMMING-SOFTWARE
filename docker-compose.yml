version: '3.8'

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: neonarena-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-gamecafe_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-GameCafe_Secure_2026!}
      POSTGRES_DB: ${DB_NAME:-gamecafe_erp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - neonarena_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Automated Backup Container ──
  db-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: neonarena-db-backup
    restart: always
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-NeonArenaErp}
      SCHEDULE: '@daily'
      BACKUP_KEEP_DAYS: 30
      BACKUP_KEEP_WEEKS: 12
      BACKUP_KEEP_MONTHS: 12
      HEALTHCHECK_PORT: 8080
    volumes:
      - db_backups:/backups
    networks:
      - neonarena_net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Redis (Optional SignalR Backplane) ──
  redis:
    image: redis:7-alpine
    container_name: neonarena-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    volumes:
      - redis_data:/data
    networks:
      - neonarena_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── .NET 8 Backend API ──
  api:
    build:
      context: ./NeonArenaErp
      dockerfile: Dockerfile
    container_name: neonarena-api
    restart: always
    ports:
      - "5015:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${DB_NAME:-NeonArenaErp};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}
      - Jwt__Secret=${JWT_SECRET:-supersecretkey_min_32_chars_long!!}
      - Jwt__RefreshSecret=${JWT_REFRESH_SECRET:-supersecretkey_refresh_min_32_chars_long!!}
      - Jwt__Issuer=NeonArenaErp
      - Jwt__Audience=NeonArenaErpClient
      - Jwt__AccessExpiry=15m
      - Jwt__RefreshExpiry=7d
      # Uncomment below to enable Redis Backplane when scaling out
      # - Redis__ConnectionString=redis:6379,password=${REDIS_PASSWORD:-redispassword}
    networks:
      - neonarena_net
    depends_on:
      postgres:
        condition: service_healthy

  # ── React Frontend (Production Build) ──
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: neonarena-client
    restart: always
    ports:
      - "5174:80"
    networks:
      - neonarena_net

  # ── React Frontend (Local Development) ──
  client-dev:
    image: node:20-alpine
    container_name: neonarena-client-dev
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - neonarena_net

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: neonarena-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt Volumes
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - neonarena_net
    depends_on:
      - api
      - client

  # ── Certbot (Let's Encrypt) ──
  certbot:
    image: certbot/certbot
    container_name: neonarena-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Run twice a day and renew if expiring
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  neonarena_net:
    driver: bridge

volumes:
  postgres_data:
  db_backups:
  redis_data:
  certbot_www:
  certbot_certs:
